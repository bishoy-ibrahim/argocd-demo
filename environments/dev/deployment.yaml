apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      serviceAccount: nginx-sa
      serviceAccountName: nginx-sa
      containers:
      - name: nginx
        image: quay.io/bishoyibrahim21/nodejs-app:latest
        ports:
        - containerPort: 80
