apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-dev
  namespace: openshift-gitops
spec:
  project: demo-project

  source:
    repoURL: https://github.com/bishoy-ibrahim/gitops-repo
    targetRevision: HEAD
    path: environments/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
